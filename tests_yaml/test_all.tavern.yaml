  - name: search with crop
    request:
      url: "{service}/indexes/{collection_name}/search"
      method: POST
      headers:
        Content-Type: application/json
      json:
        q: "второй"
        crop_fields: [ "content" ]
        crop_length: 5
    response:
      status_code: 200

  - name: search with crop and marker
    request:
      url: "{service}/indexes/{collection_name}/search"
      method: POST
      headers:
        Content-Type: application/json
      json:
        q: "второй"
        crop_fields: [ "content" ]
        crop_length: 5
        crop_marker: "***"
    response:
      status_code: 200

  - name: search with phrase
    request:
      url: "{service}/indexes/{collection_name}/search"
      method: POST
      headers:
        Content-Type: application/json
      json:
        q: "имени"
        limit: 5
        phrase: True
    response:
      status_code: 200

  - name: search with field selector
    request:
      url: "{service}/indexes/{collection_name}/search"
      method: POST
      headers:
        Content-Type: application/json
      json:
        q: "хранившихся"
        attributesToRetrieve: [ "id", "title" ]
    response:
      status_code: 200

  - name: search with fuzzy
    request:
      url: "{service}/indexes/{collection_name}/search"
      method: POST
      headers:
        Content-Type: application/json
      json:
        q: "трихугольную"
        limit: 5
        fuzzy: True
    response:
      status_code: 200

  - name: search with fuzzy and fuzzy_max,edits
    request:
      url: "{service}/indexes/{collection_name}/search"
      method: POST
      headers:
        Content-Type: application/json
      json:
        q: "ЦЕТАТА"
        limit: 5
        fuzzy: True
        fuzzy_max_edits: 1
    response:
      status_code: 200

  - name: search with partial
    request:
      url: "{service}/indexes/{collection_name}/search"
      method: POST
      headers:
        Content-Type: application/json
      json:
        q: "док"
        limit: 5
        partial: True
    response:
      status_code: 200

  - name: delete collection
    request:
      url: "{service}/indexes/collections/{collection_name}"
      method: DELETE
      headers:
        Content-Type: application/json
    response:
      status_code: 200
      json:
        message: "Схема удалена"

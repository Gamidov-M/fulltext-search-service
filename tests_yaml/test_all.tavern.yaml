test_name: Tests create, get, delete collection

includes:
  - !include common.yaml

stages:
  - name: create collection
    request:
      url: "{service}/indexes/collections"
      method: POST
      headers:
        Content-Type: application/json
      json:
        name: "{collection_name}"
        fields:
          - name: "id"
            type: "int"
          - name: "name"
            type: "string"
          - name: "content"
            type: "string"
    response:
      status_code: 201
      save:
        json:
          collection_name: name
          fields_list: "fields"

  - name: get list of collections
    request:
      url: "{service}/indexes/collections"
      method: GET
      headers:
        Content-Type: application/json
    response:
      status_code: 200
      json:
        collections: !anylist

  - name: get collection
    request:
      url: "{service}/indexes/collections/{collection_name}"
      method: GET
      headers:
        Content-Type: application/json
    response:
      status_code: 200
      json:
        name: "{collection_name}"
        fields: !anylist

  - name: download json
    request:
      url: "{service}/indexes/{collection_name}/documents"
      method: POST
      headers:
        Content-Type: application/json
      json: !include /home/magomed/PycharmProjects/fulltext-search-service/tests/data_documents/documents_3.json
    response:
      status_code: 202

  - name: get list of documents
    request:
      url: "{service}/indexes/{collection_name}/documents?offset=0&limit=15"
      method: GET
      headers:
        Content-Type: application/json
      params:
        limit: 15
        offset: 0
    response:
      status_code: 200

  - name: search basic
    request:
      url: "{service}/indexes/{collection_name}/search"
      method: POST
      headers:
        Content-Type: application/json
      json:
        q: "имени"
        limit: 5
        offset: 0
    response:
      status_code: 200


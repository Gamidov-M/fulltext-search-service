test_name: Tests create, get, delete collection

includes:
  - !include common.yaml

stages:
  - name: create collection
    request:
      url: "{service}/indexes/collections"
      method: POST
      headers: { headers }
      json:
        name: "{collection_name}"
        fields:
          - name: "id"
            type: "int"
          - name: "name"
            type: "string"
          - name: "content"
            type: "string"
    response:
      status_code: 201
      save:
        json:
          collection_name: name
          fields_list: "fields"

  - name: download json (full reindex (base))
    request:
      url: "{service}/indexes/{collection_name}/documents"
      method: POST
      headers: { headers }
      json: !include /home/magomed/PycharmProjects/fulltext-search-service/tests/data_documents/base_documents.json
    response:
      status_code: 202

  - name: download json (full reindex)
    request:
      url: "{service}/indexes/{collection_name}/documents"
      method: POST
      headers: { headers }
      json: !include /home/magomed/PycharmProjects/fulltext-search-service/tests/data_documents/documents_1.json
    response:
      status_code: 202

  - name: Test incremental update with true
    request:
      url: "{service}/indexes/{collection_name}/documents"
      method: POST
      headers: { headers }
      params:
        incremental: true
      json: !include ../tests/data_documents/documents_2.json
    response:
      status_code: 202

  - name: Test incremental update with str 1
    request:
      url: "{service}/indexes/{collection_name}/documents"
      method: POST
      headers:
        Content-Type: application/json
      params:
        incremental: "1"
      json: !include ../tests/data_documents/documents_2.json
    response:
      status_code: 202

  - name: Test incremental update with int 1
    request:
      url: "{service}/indexes/{collection_name}/documents"
      method: POST
      headers:
        Content-Type: application/json
      params:
        incremental: 1
      json: !include ../tests/data_documents/documents_2.json
    response:
      status_code: 202

  - name: Test incremental update with yes
    request:
      url: "{service}/indexes/{collection_name}/documents"
      method: POST
      headers:
        Content-Type: application/json
      params:
        incremental: "yes"
      json: !include ../tests/data_documents/documents_2.json
    response:
      status_code: 202

  - name: Test update (doc with id_1)
    request:
      url: "{service}/indexes/{collection_name}/documents"
      method: POST
      headers: { headers }
      params:
        incremental: true
      json: !include ../tests/data_documents/documents_3.json
    response:
      status_code: 202

  - name: Test mixed update (updating and changing documents)
    request:
      url: "{service}/indexes/{collection_name}/documents"
      method: POST
      headers: { headers }
      params:
        incremental: true
      json: !include ../tests/data_documents/documents_4.json
    response:
      status_code: 202

  - name: Test invalid json format
    request:
      url: "{service}/indexes/{collection_name}/documents"
      method: POST
      headers: { headers }
      params:
        incremental: true
      json:
        invalid": "format"
    response:
      status_code: 400

# Тест с невалидным значением query-параметром incremental проходит, статус 202
#  - name: Test invalid incremental value
#    request:
#      url: "{service}/indexes/{collection_name}/documents"
#      method: POST
#      headers: { headers }
#      params:
#        incremental: 556565
#      json: !include ../tests/data_documents/documents_4.json
#    response:
#      status_code: 400

  - name: Test invalid without required fields
    request:
      url: "{service}/indexes/{collection_name}/documents"
      method: POST
      headers: { headers }
      params:
        incremental: "invalid_value"
      json:
        "wrong_field": "content"
    response:
      status_code: 400

  - name: delete collection
    request:
      url: "{service}/indexes/collections/{collection_name}"
      method: DELETE
      headers:
        Content-Type: application/json
    response:
      status_code: 200
      json:
        message: "Схема удалена"
